<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geo Crew — Action Items</title>
  <style>
    :root {
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ee;
      --accent: #1f5fbf;
      --accent-soft: #eaf2ff;
      --radius-sm: 10px;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 2px 12px rgba(18, 40, 76, 0.07);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #eef2f8;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }

    .hero-left { display: flex; flex-direction: column; gap: 6px; }

    .eyebrow {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 700;
      width: fit-content;
    }

    h1 { margin: 0; font-size: clamp(22px, 3.5vw, 32px); line-height: 1.15; font-weight: 700; }
    h2 { margin: 0 0 16px; font-size: 17px; font-weight: 700; }

    .nav { display: flex; gap: 8px; flex-wrap: wrap; }

    .nav a {
      display: inline-block;
      text-decoration: none;
      background: #eef3f9;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--line);
      transition: background 0.15s;
    }
    .nav a:hover { background: #e0eaf7; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f4f7fc;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 16px;
      min-width: 110px;
    }

    .stat-pill .stat-num { font-size: 22px; font-weight: 700; line-height: 1; color: var(--text); }
    .stat-pill .stat-label { font-size: 12px; color: var(--muted); line-height: 1.3; }
    .stat-pill.open   .stat-num { color: #b91c1c; }
    .stat-pill.closed .stat-num { color: #15803d; }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    input, select {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      background: #fff;
      font: inherit;
      font-size: 13px;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #7aabf0;
      box-shadow: 0 0 0 3px rgba(31, 95, 191, 0.10);
    }

    .btn {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: #f0f4f9;
      color: var(--text);
      transition: background 0.13s;
      white-space: nowrap;
      text-decoration: none;
    }
    .btn:hover { background: #e2eaf5; }

    .filter-clear {
      font-size: 13px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 4px;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .filter-clear:hover { color: #174fa8; }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th, td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f4f7fc;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    th:hover { color: var(--text); }
    th .sort-icon { display: inline-block; margin-left: 4px; opacity: 0.4; font-size: 10px; }
    th.sorted .sort-icon { opacity: 1; color: var(--accent); }

    tr:last-child td { border-bottom: 0; }
    tr:hover td { background: #f8fbff; }

    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-badge.open   { background: #fee2e2; color: #b91c1c; }
    .status-badge.closed { background: #dcfce7; color: #15803d; }

    .category-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .overdue { color: #b91c1c; font-weight: 600; }

    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty p { margin: 0 0 6px; font-size: 15px; }
    .empty small { font-size: 13px; }

    .muted { color: var(--muted); font-size: 13px; }

    @media (max-width: 640px) {
      .wrap { padding: 14px 12px 40px; }
      .hero { padding: 18px; }
      .card { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <header class="hero">
      <div class="hero-left">
        <span class="eyebrow">Geo Crew</span>
        <h1>Action Items</h1>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="weekly-catchup.html">Weekly Catch-up</a>
        <a href="seminars.html">Seminar Planner</a>
      </nav>
    </header>

    <section class="card">
      <div class="stats-row" id="statsRow"></div>

      <div class="filters">
        <input id="search" type="text" placeholder="Search action items…" style="flex: 1 1 200px;" />
        <select id="filterStatus" style="min-width:130px;">
          <option value="">All Statuses</option>
          <option value="Open">Open</option>
          <option value="Closed">Closed</option>
        </select>
        <select id="filterCategory" style="min-width:160px;">
          <option value="">All Categories</option>
        </select>
        <select id="filterAssignee" style="min-width:160px;">
          <option value="">All Assignees</option>
        </select>
        <button class="filter-clear" id="clearFilters" type="button">Clear filters</button>
        <button class="btn" id="importBtn" type="button">Import JSON</button>
        <input id="importFile" type="file" accept="application/json,.json" style="display:none;" />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-col="meetingDate">Meeting Date <span class="sort-icon">↕</span></th>
              <th data-col="category">Category <span class="sort-icon">↕</span></th>
              <th data-col="description" style="min-width:220px;">Action Item <span class="sort-icon">↕</span></th>
              <th data-col="delegatedTo">Assigned To <span class="sort-icon">↕</span></th>
              <th data-col="dueDate">Due Date <span class="sort-icon">↕</span></th>
              <th data-col="status">Status <span class="sort-icon">↕</span></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <p id="resultCount" style="margin:12px 0 0; font-size:13px; color:var(--muted);"></p>
    </section>

  </div>

  <script>
    const storageKey = "geo-crew-weekly-catchup";
    const today = new Date(); today.setHours(0,0,0,0);
    let sortCol = "dueDate";
    let sortAsc = true;

    function escapeHtml(str) {
      return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }

    function formatDate(v) {
      if (!v) return "—";
      return new Date(v + "T00:00:00").toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" });
    }

    function isOverdue(dueDate, status) {
      if (!dueDate || status === "Closed") return false;
      return new Date(dueDate + "T00:00:00") < today;
    }

    function getEntries() {
      try { const p = JSON.parse(localStorage.getItem(storageKey)); return Array.isArray(p) ? p : []; }
      catch { return []; }
    }

    function getAllActionItems() {
      const items = [];
      for (const entry of getEntries()) {
        if (!Array.isArray(entry.actionItems)) continue;
        for (const ai of entry.actionItems) items.push({ ...ai, meetingDate: entry.date || "" });
      }
      return items;
    }

    function populateFilterOptions(items) {
      const categories = [...new Set(items.map(i => i.category).filter(Boolean))].sort();
      const assignees  = [...new Set(items.map(i => i.delegatedTo).filter(Boolean))].sort();

      const catSel = document.getElementById("filterCategory");
      catSel.innerHTML = '<option value="">All Categories</option>';
      categories.forEach(c => { const o = document.createElement("option"); o.value = o.textContent = c; catSel.appendChild(o); });

      const asnSel = document.getElementById("filterAssignee");
      asnSel.innerHTML = '<option value="">All Assignees</option>';
      assignees.forEach(a => { const o = document.createElement("option"); o.value = o.textContent = a; asnSel.appendChild(o); });
    }

    function renderStats(items) {
      const total   = items.length;
      const open    = items.filter(i => i.status === "Open").length;
      const closed  = items.filter(i => i.status === "Closed").length;
      const overdue = items.filter(i => isOverdue(i.dueDate, i.status)).length;
      document.getElementById("statsRow").innerHTML = `
        <div class="stat-pill">
          <div><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
        </div>
        <div class="stat-pill open">
          <div><div class="stat-num">${open}</div><div class="stat-label">Open</div></div>
        </div>
        <div class="stat-pill closed">
          <div><div class="stat-num">${closed}</div><div class="stat-label">Closed</div></div>
        </div>
        <div class="stat-pill" style="${overdue > 0 ? "border-color:#fca5a5;" : ""}">
          <div><div class="stat-num" style="${overdue > 0 ? "color:#b91c1c;" : ""}">${overdue}</div><div class="stat-label">Overdue</div></div>
        </div>`;
    }

    function getFilteredSorted() {
      const q        = document.getElementById("search").value.trim().toLowerCase();
      const status   = document.getElementById("filterStatus").value;
      const category = document.getElementById("filterCategory").value;
      const assignee = document.getElementById("filterAssignee").value;

      let items = getAllActionItems();
      if (q) items = items.filter(i => [i.description,i.category,i.delegatedTo,i.meetingDate,i.dueDate,i.status].join(" ").toLowerCase().includes(q));
      if (status)   items = items.filter(i => i.status === status);
      if (category) items = items.filter(i => i.category === category);
      if (assignee) items = items.filter(i => i.delegatedTo === assignee);

      items.sort((a, b) => {
        const av = (a[sortCol] || "").toLowerCase();
        const bv = (b[sortCol] || "").toLowerCase();
        return av < bv ? (sortAsc ? -1 : 1) : av > bv ? (sortAsc ? 1 : -1) : 0;
      });
      return items;
    }

    function render() {
      const items = getFilteredSorted();
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><p>No action items found.</p><small>Try adjusting your filters, or add entries in the Weekly Catch-up.</small></div></td></tr>`;
        document.getElementById("resultCount").textContent = "";
        return;
      }

      for (const ai of items) {
        const over = isOverdue(ai.dueDate, ai.status);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="color:var(--muted);font-size:12px;white-space:nowrap;">${escapeHtml(formatDate(ai.meetingDate))}</td>
          <td><span class="category-badge">${escapeHtml(ai.category || "—")}</span></td>
          <td>${escapeHtml(ai.description || "—")}</td>
          <td>${escapeHtml(ai.delegatedTo || "—")}</td>
          <td class="${over ? "overdue" : ""}">${escapeHtml(formatDate(ai.dueDate))}${over ? " ⚠" : ""}</td>
          <td><span class="status-badge ${(ai.status||"Open").toLowerCase()}">${escapeHtml(ai.status||"Open")}</span></td>`;
        tbody.appendChild(tr);
      }

      const total = getAllActionItems().length;
      document.getElementById("resultCount").textContent =
        items.length === total
          ? `Showing all ${total} action item${total !== 1 ? "s" : ""}`
          : `Showing ${items.length} of ${total} action item${total !== 1 ? "s" : ""}`;
    }

    function renderAll() {
      const all = getAllActionItems();
      renderStats(all);
      populateFilterOptions(all);
      render();
    }

    document.querySelectorAll("th[data-col]").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.dataset.col;
        sortAsc = sortCol === col ? !sortAsc : true;
        sortCol = col;
        document.querySelectorAll("th[data-col]").forEach(h => { h.classList.remove("sorted"); h.querySelector(".sort-icon").textContent = "↕"; });
        th.classList.add("sorted");
        th.querySelector(".sort-icon").textContent = sortAsc ? "↑" : "↓";
        render();
      });
    });

    ["search","filterStatus","filterCategory","filterAssignee"].forEach(id => {
      document.getElementById(id).addEventListener("input", render);
    });

    document.getElementById("clearFilters").addEventListener("click", () => {
      ["search","filterStatus","filterCategory","filterAssignee"].forEach(id => {
        const el = document.getElementById(id);
        el.tagName === "INPUT" ? (el.value = "") : (el.value = "");
      });
      render();
    });

    document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());

    document.getElementById("importFile").addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        if (!Array.isArray(parsed)) throw new Error();
        const cleaned = parsed.filter(x => x && typeof x === "object").map(item => ({
          id: item.id || crypto.randomUUID(), date: item.date||"", notes: item.notes||"",
          attendees: Array.isArray(item.attendees) ? item.attendees : [],
          actionItems: Array.isArray(item.actionItems) ? item.actionItems.map(ai => ({
            id: ai.id||crypto.randomUUID(), category: ai.category||"", description: ai.description||"",
            delegatedTo: ai.delegatedTo||"", dueDate: ai.dueDate||"",
            status: ["Open","Closed"].includes(ai.status) ? ai.status : "Open"
          })) : []
        }));
        localStorage.setItem(storageKey, JSON.stringify(cleaned));
        renderAll();
        alert("JSON imported successfully.");
      } catch { alert("Could not import this JSON file."); }
      finally { e.target.value = ""; }
    });

    document.querySelector(`th[data-col="${sortCol}"]`).classList.add("sorted");
    document.querySelector(`th[data-col="${sortCol}"] .sort-icon`).textContent = "↑";

    renderAll();
  </script>
</body>
</html>
