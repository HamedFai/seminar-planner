<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geo Crew — Seminar Planner</title>
  <style>
    :root {
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ee;
      --accent: #1f5fbf;
      --accent-soft: #eaf2ff;
      --radius-sm: 10px;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 2px 12px rgba(18, 40, 76, 0.07);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #eef2f8;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    /* ── Hero ── */
    .hero {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }

    .hero-left { display: flex; flex-direction: column; gap: 6px; }

    .eyebrow {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 700;
      width: fit-content;
    }

    h1 { margin: 0; font-size: clamp(22px, 3.5vw, 32px); line-height: 1.15; font-weight: 700; }
    h2 { margin: 0 0 16px; font-size: 17px; font-weight: 700; }
    h3 { margin: 0 0 12px; font-size: 16px; font-weight: 700; }

    .nav { display: flex; gap: 8px; flex-wrap: wrap; }

    .nav a {
      display: inline-block;
      text-decoration: none;
      background: #eef3f9;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--line);
      transition: background 0.15s;
    }
    .nav a:hover { background: #e0eaf7; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }

    /* ── Overview meta grid ── */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .meta-item {
      background: #f4f7fc;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .meta-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    .meta-value { font-size: 14px; font-weight: 600; }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label { font-size: 13px; font-weight: 700; }

    .field input, .field select, .field textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      background: #fff;
      font: inherit;
      font-size: 14px;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: #7aabf0;
      box-shadow: 0 0 0 3px rgba(31, 95, 191, 0.10);
    }

    .field textarea { min-height: 92px; resize: vertical; line-height: 1.5; }

    .full { grid-column: 1 / -1; }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 9px 16px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: #f0f4f9;
      color: var(--text);
      transition: background 0.13s;
      white-space: nowrap;
    }
    .btn:hover { background: #e2eaf5; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(31, 95, 191, 0.22);
    }
    .btn-primary:hover { background: #174fa8; border-color: #174fa8; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    /* ── Search / filter inputs (toolbar context) ── */
    .toolbar input, .toolbar select {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      background: #fff;
      font: inherit;
      font-size: 13px;
      color: var(--text);
    }

    .toolbar input:focus, .toolbar select:focus {
      outline: none;
      border-color: #7aabf0;
      box-shadow: 0 0 0 3px rgba(31, 95, 191, 0.10);
    }

    /* ── Table ── */
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f4f7fc;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    tr:last-child td { border-bottom: 0; }
    tr:hover td { background: #f8fbff; }

    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-badge.draft   { background: #eef2f7; color: #4b5563; }
    .status-badge.planned { background: #fff0d8; color: #92400e; }
    .status-badge.ready   { background: #dcfce7; color: #15803d; }

    .row-actions { display: flex; gap: 6px; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .muted { color: var(--muted); font-size: 13px; }

    @media (max-width: 900px) {
      .meta-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .wrap { padding: 14px 12px 40px; }
      .hero { padding: 18px; }
      .card { padding: 16px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      .meta-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <header class="hero">
      <div class="hero-left">
        <span class="eyebrow">Geo Crew</span>
        <h1>Seminar Planner</h1>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="weekly-catchup.html">Weekly Catch-up</a>
        <a href="action-items.html">Action Items</a>
      </nav>
    </header>

    <!-- Overview -->
    <section class="card">
      <h2>Seminar Overview</h2>
      <div class="meta-grid">
        <div class="meta-item">
          <span class="meta-label">Frequency</span>
          <span class="meta-value">Every second Tuesday</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Time</span>
          <span class="meta-value">21:00 Sydney time</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Format</span>
          <span class="meta-value">10–30 min talk + Q&amp;A</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Audience</span>
          <span class="meta-value">Geo Crew</span>
        </div>
      </div>
    </section>

    <!-- Add / Edit -->
    <section class="card">
      <h2>Add or Update a Seminar</h2>
      <div class="form-grid">
        <div class="field">
          <label for="date">Date</label>
          <input id="date" type="date" />
        </div>
        <div class="field">
          <label for="presenter">Presenter</label>
          <select id="presenter"></select>
        </div>
        <div class="field full">
          <label for="topic">Topic</label>
          <input id="topic" type="text" placeholder="Enter seminar topic" />
        </div>
        <div class="field">
          <label for="status">Status</label>
          <select id="status">
            <option>Draft</option>
            <option>Planned</option>
            <option>Ready</option>
          </select>
        </div>
        <div class="field">
          <label for="slides">Slides link</label>
          <input id="slides" type="url" placeholder="https://…" />
        </div>
        <div class="field full">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Short notes, support needed, or reminders"></textarea>
        </div>
      </div>
      <div class="toolbar" style="margin-top:16px;">
        <button class="btn btn-primary" id="saveBtn" type="button">Save Entry</button>
        <button class="btn" id="clearBtn" type="button">Clear Form</button>
      </div>
    </section>

    <!-- Planned Sessions -->
    <section class="card">
      <h2>Planned Sessions</h2>
      <div class="toolbar" style="margin-bottom:14px;">
        <input id="search" type="text" placeholder="Search by presenter, topic, or date…" style="flex:1 1 220px;" />
        <select id="filterStatus" style="min-width:140px;">
          <option value="">All Statuses</option>
          <option value="Draft">Draft</option>
          <option value="Planned">Planned</option>
          <option value="Ready">Ready</option>
        </select>
        <button class="btn" id="exportBtn" type="button">Export JSON</button>
        <button class="btn" id="importBtn" type="button">Import JSON</button>
        <input id="importFile" type="file" accept="application/json,.json" style="display:none;" />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Presenter</th>
              <th>Topic</th>
              <th>Status</th>
              <th>Slides</th>
              <th>Notes</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

  </div>

  <script>
    const members = [
      "Ahmad Tawfiq","Cid Dieguez","Dai Nelsey","Dhiyyaz Razip","Erey Helmy",
      "Federica Santoro","Habibuzaid Bahari","Hamed Faizi","Hoang Nguyen",
      "Kamil Adamek","Karol Filipowski","Lucas Marques","Mateus Belbuche",
      "Mohd Firdaus Bin Faudz","Salim Silveira","Siti Salwa Samigin","Vinnie Charrot"
    ];

    const storageKey = "geo-crew-seminar-planner";
    let editingId = null;

    const presenterEl = document.getElementById("presenter");
    const tableBody   = document.getElementById("tableBody");

    members.forEach(name => {
      const o = document.createElement("option"); o.value = o.textContent = name; presenterEl.appendChild(o);
    });

    function escapeHtml(str) {
      return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }

    function getEntries() {
      try { const p = JSON.parse(localStorage.getItem(storageKey)); return Array.isArray(p) ? p : []; }
      catch { return []; }
    }

    function setEntries(e) { localStorage.setItem(storageKey, JSON.stringify(e)); }

    function formatDate(v) {
      if (!v) return "—";
      return new Date(v + "T00:00:00").toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" });
    }

    function badgeClass(status) {
      if (status === "Ready")  return "ready";
      if (status === "Planned") return "planned";
      return "draft";
    }

    function clearForm() {
      editingId = null;
      document.getElementById("date").value = "";
      document.getElementById("presenter").selectedIndex = 0;
      document.getElementById("topic").value = "";
      document.getElementById("status").value = "Draft";
      document.getElementById("slides").value = "";
      document.getElementById("notes").value = "";
      document.getElementById("saveBtn").textContent = "Save Entry";
    }

    function fillForm(item) {
      editingId = item.id;
      document.getElementById("date").value = item.date || "";
      document.getElementById("presenter").value = item.presenter || members[0];
      document.getElementById("topic").value = item.topic || "";
      document.getElementById("status").value = item.status || "Draft";
      document.getElementById("slides").value = item.slides || "";
      document.getElementById("notes").value = item.notes || "";
      document.getElementById("saveBtn").textContent = "Update Entry";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function render() {
      const q      = document.getElementById("search").value.trim().toLowerCase();
      const filter = document.getElementById("filterStatus").value;

      const entries = getEntries()
        .slice().sort((a, b) => (a.date||"").localeCompare(b.date||""))
        .filter(item => {
          const hay = [item.date, item.presenter, item.topic, item.notes].join(" ").toLowerCase();
          return (!q || hay.includes(q)) && (!filter || item.status === filter);
        });

      tableBody.innerHTML = "";

      if (!entries.length) {
        tableBody.innerHTML = `<tr><td colspan="7" class="muted">No sessions found. Import a JSON file or add an entry above.</td></tr>`;
        return;
      }

      for (const item of entries) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="white-space:nowrap;">${escapeHtml(formatDate(item.date))}</td>
          <td>${escapeHtml(item.presenter || "—")}</td>
          <td>${escapeHtml(item.topic || "—")}</td>
          <td><span class="status-badge ${badgeClass(item.status)}">${escapeHtml(item.status || "Draft")}</span></td>
          <td>${item.slides ? `<a href="${encodeURI(item.slides)}" target="_blank" rel="noopener noreferrer">Open</a>` : `<span class="muted">—</span>`}</td>
          <td>${escapeHtml(item.notes || "—")}</td>
          <td>
            <div class="row-actions">
              <button class="btn" data-action="edit" data-id="${item.id}" type="button">Edit</button>
              <button class="btn" data-action="delete" data-id="${item.id}" type="button">Delete</button>
            </div>
          </td>`;
        tableBody.appendChild(tr);
      }
    }

    document.getElementById("saveBtn").addEventListener("click", () => {
      const date      = document.getElementById("date").value;
      const presenter = document.getElementById("presenter").value;
      const topic     = document.getElementById("topic").value.trim();
      const status    = document.getElementById("status").value;
      const slides    = document.getElementById("slides").value.trim();
      const notes     = document.getElementById("notes").value.trim();

      if (!date || !presenter || !topic) { alert("Please complete date, presenter, and topic."); return; }

      const entries = getEntries();
      if (editingId) {
        const idx = entries.findIndex(x => x.id === editingId);
        if (idx >= 0) entries[idx] = { ...entries[idx], date, presenter, topic, status, slides, notes };
      } else {
        entries.push({ id: crypto.randomUUID(), date, presenter, topic, status, slides, notes });
      }
      setEntries(entries); clearForm(); render();
    });

    document.getElementById("clearBtn").addEventListener("click", clearForm);
    document.getElementById("search").addEventListener("input", render);
    document.getElementById("filterStatus").addEventListener("change", render);

    // document.getElementById("exportBtn").addEventListener("click", () => {
    //   const blob = new Blob([JSON.stringify(getEntries(), null, 2)], { type: "application/json" });
    //   const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: "geo-crew-seminars.json" });
    //   a.click(); URL.revokeObjectURL(a.href);
    // });

    document.getElementById("exportBtn").addEventListener("click", () => {
      const now = new Date();
    
      // Format date as YYYYMMDD
      const date = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, "0")}${String(now.getDate()).padStart(2, "0")}`;
    
      // Find next available index
      let index = 1;
      let filename;
    
      // Separate tracking for seminar files
      if (!window._exportedSeminarFilenames) {
        window._exportedSeminarFilenames = new Set();
      }
    
      while (true) {
        const suffix = String(index).padStart(2, "0");
        filename = `${date}-${suffix}_seminar.json`;
    
        if (!window._exportedSeminarFilenames.has(filename)) {
          window._exportedSeminarFilenames.add(filename);
          break;
        }
    
        index++;
      }
    
      const blob = new Blob(
        [JSON.stringify(getEntries(), null, 2)],
        { type: "application/json" }
      );
    
      const a = Object.assign(document.createElement("a"), {
        href: URL.createObjectURL(blob),
        download: filename
      });
    
      a.click();
      URL.revokeObjectURL(a.href);
    });

    document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());

    document.getElementById("importFile").addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        if (!Array.isArray(parsed)) throw new Error();
        const cleaned = parsed.filter(x => x && typeof x === "object").map(item => ({
          id: item.id || crypto.randomUUID(), date: item.date||"", presenter: item.presenter||"",
          topic: item.topic||"", status: ["Draft","Planned","Ready"].includes(item.status) ? item.status : "Draft",
          slides: item.slides||"", notes: item.notes||""
        }));
        setEntries(cleaned); clearForm(); render();
        alert("JSON imported successfully.");
      } catch { alert("Could not import this JSON file."); }
      finally { e.target.value = ""; }
    });

    tableBody.addEventListener("click", e => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const { action, id } = btn.dataset;
      const entries = getEntries();
      const item = entries.find(x => x.id === id);
      if (!item) return;
      if (action === "edit") fillForm(item);
      if (action === "delete") { setEntries(entries.filter(x => x.id !== id)); if (editingId===id) clearForm(); render(); }
    });

    render();
  </script>
</body>
</html>
