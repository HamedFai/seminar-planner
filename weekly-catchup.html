<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo Crew Weekly Catch-up</title>

<style>
:root {
  --bg:#f5f7fb;
  --card:#ffffff;
  --line:#dbe3ee;
  --text:#1f2937;
  --muted:#6b7280;
  --accent:#1f5fbf;
}

* { box-sizing:border-box; }

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}

.wrap {
  max-width:1100px;
  margin:auto;
  padding:24px;
}

.card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px;
  margin-bottom:20px;
  overflow:hidden;
}

.panel {
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
}

.entry-layout {
  display:grid;
  grid-template-columns:300px 1fr;
  gap:16px;
}

.entry-meta,
.entry-main {
  display:grid;
  gap:14px;
  min-width:0;
}

.field {
  display:flex;
  flex-direction:column;
  gap:6px;
}

input,select,textarea {
  width:100%;
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
}

textarea {
  min-height:180px;
}

.checklist {
  border:1px solid var(--line);
  padding:10px;
  border-radius:10px;
  max-height:200px;
  overflow:auto;
}

.check-item {
  display:flex;
  gap:8px;
}

/* FIXED TABLE */
.table-wrap {
  width:100%;
  overflow:hidden; /* removes scrollbar */
}

table {
  width:100%;
  border-collapse:collapse;
  table-layout:fixed; /* prevents expansion */
}

th,td {
  padding:10px;
  border-bottom:1px solid var(--line);
  font-size:14px;
  word-break:break-word;
}

th {
  background:#f3f6fb;
  font-size:12px;
  text-transform:uppercase;
}

.actions {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

button {
  padding:8px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-primary { background:var(--accent); color:white; }
.btn-secondary { background:#eef3f9; }

.saved-entry {
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
}

.saved-entry-body {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

.saved-section {
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
}

@media(max-width:900px){
  .entry-layout { grid-template-columns:1fr; }
  .saved-entry-body { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="entry-layout">

<!-- LEFT -->
<div class="entry-meta">

<div class="panel">
<label>Date</label>
<input id="date" type="date">
</div>

<div class="panel">
<label>Attendees</label>
<div id="attendeeList" class="checklist"></div>
</div>

</div>

<!-- RIGHT -->
<div class="entry-main">

<!-- ✅ MOVED NOTES ABOVE -->
<div class="panel">
<label>Meeting Notes</label>
<textarea id="notes"></textarea>
</div>

<!-- ACTION ITEMS -->
<div class="panel">

<h4>Action Item Details</h4>

<div class="field">
<select id="ai-category">
<option value="">Category</option>
<option>General</option>
</select>
</div>

<div class="field">
<input id="ai-description" placeholder="Action item">
</div>

<div class="field">
<input id="ai-due-date" type="date">
</div>

<div class="field">
<select id="ai-status">
<option>Open</option>
<option>Closed</option>
</select>
</div>

<button id="add-ai-btn" class="btn-secondary">Add</button>

<h4>Current Items</h4>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Category</th>
<th>Action</th>
<th>Status</th>
<th></th>
</tr>
</thead>

<tbody id="currentActionItemsTableBody">
<tr><td colspan="4" class="muted">No action items added yet.</td></tr>
</tbody>
</table>
</div>

</div>

</div>
</div>

<button id="saveBtn" class="btn-primary">Save</button>

</div>

<div class="card">

<h3>Saved</h3>

<div id="savedEntries"></div>

</div>

</div>

<script>
const members=["Alice","Bob","Charlie"];
const attendeeList=document.getElementById("attendeeList");

let currentActionItems=[];
const tableBody=document.getElementById("currentActionItemsTableBody");

function buildAttendees(){
  attendeeList.innerHTML=members.map((m,i)=>`
    <div class="check-item">
      <input type="checkbox" value="${m}">
      <label>${m}</label>
    </div>`).join("");
}

function renderTable(){
  if(!currentActionItems.length){
    tableBody.innerHTML='<tr><td colspan="4">No action items added yet.</td></tr>';
    return;
  }

  tableBody.innerHTML=currentActionItems.map(ai=>`
    <tr>
      <td>${ai.category}</td>
      <td>${ai.description}</td>
      <td>${ai.status}</td>
      <td><button onclick="deleteAI('${ai.id}')">X</button></td>
    </tr>`).join("");
}

function deleteAI(id){
  currentActionItems=currentActionItems.filter(x=>x.id!==id);
  renderTable();
}

document.getElementById("add-ai-btn").onclick=()=>{
  const ai={
    id:crypto.randomUUID(),
    category:document.getElementById("ai-category").value,
    description:document.getElementById("ai-description").value,
    status:document.getElementById("ai-status").value
  };
  if(!ai.description)return;
  currentActionItems.push(ai);
  renderTable();
};

buildAttendees();
renderTable();
</script>

</body>
</html>
