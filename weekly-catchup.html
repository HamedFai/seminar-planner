<div class="entry-layout">
  <div class="entry-meta">
    <div class="panel">
      <div class="field">
        <label for="date">Meeting Date</label>
        <input id="date" type="date" />
      </div>
    </div>

    <div class="panel">
      <div class="field">
        <label>Attendees</label>
        <div id="attendeeList" class="checklist"></div>
      </div>
    </div>
  </div>

  <div class="entry-main">
    <div class="panel">
      <h3>Action Item Details</h3>

      <div class="action-item-grid">
        <div class="field">
          <label for="ai-category">Category</label>
          <select id="ai-category">
            <option value="">Select Category</option>
            <option>General admin</option>
            <option>Rome lab</option>
            <option>Data platform</option>
            <option>Offshore ops</option>
            <option>System & procedures</option>
          </select>
        </div>

        <div class="field">
          <label for="ai-delegated-to">Delegated To</label>
          <select id="ai-delegated-to"></select>
        </div>

        <div class="field full">
          <label for="ai-description">Action Item</label>
          <input id="ai-description" type="text" placeholder="Describe the action item" />
        </div>

        <div class="field">
          <label for="ai-due-date">Due Date</label>
          <input id="ai-due-date" type="date" />
        </div>

        <div class="field">
          <label for="ai-status">Status</label>
          <select id="ai-status">
            <option>Open</option>
            <option>Closed</option>
          </select>
        </div>
      </div>

      <div class="toolbar" style="margin-top:16px;">
        <button class="btn-secondary" id="add-ai-btn">Add Action Item to Note</button>
        <button class="btn-secondary" id="clear-ai-form-btn" type="button">Clear Action Item Fields</button>
      </div>
    </div>

    <div class="panel">
      <div class="field">
        <label for="notes">Meeting Notes</label>
        <textarea id="notes" placeholder="Add the weekly meeting notes here"></textarea>
      </div>
    </div>
  </div>
</div>
