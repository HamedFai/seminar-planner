<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geo Crew Weekly Catch-up</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ee;
      --accent: #1f5fbf;
      --accent-soft: #eaf2ff;
      --shadow: 0 10px 28px rgba(18, 40, 76, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7f9fc 0%, #eef3fa 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 18px 48px;
    }

    .hero, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 22px;
    }

    .card {
      padding: 22px;
      border-radius: var(--radius);
      margin-bottom: 22px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.1;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .nav {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav a,
    .btn,
    button {
      display: inline-block;
      text-decoration: none;
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary,
    button.btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-secondary,
    button.btn-secondary,
    .nav a {
      background: #eef3f9;
      color: var(--text);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 14px;
      font-weight: 700;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      background: #fff;
      font: inherit;
      color: var(--text);
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    .checklist {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fbfdff;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .check-item input[type="checkbox"] {
      width: auto;
      margin: 0;
    }

    .check-item label {
      font-weight: 500;
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f8fbff;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    tr:last-child td { border-bottom: 0; }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 820px) {
      .wrap { padding: 18px 14px 36px; }
      .hero, .card { padding: 18px; }
      .checklist { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Geo Crew</div>
      <h1>Weekly Catch-up</h1>
      <p class="sub">Record of key points discussed.</p>
      <div class="nav">
        <a href="index.html">Home</a>
        <a href="seminars.html">Seminar Planner</a>
      </div>
    </section>

    <section class="card">
      <h2>Add Weekly Notes</h2>
      <div class="form-grid">
        <div class="field">
          <label for="date">Date</label>
          <input id="date" type="date" />
        </div>

        <div class="field">
          <label>Attendees</label>
          <div id="attendeeList" class="checklist"></div>
        </div>

        <div class="field">
          <label for="notes">Meeting Notes</label>
          <textarea id="notes" placeholder="Add the weekly meeting notes here"></textarea>
        </div>
      </div>

      <div class="toolbar" style="margin-top: 16px;">
        <button class="btn-primary" id="saveBtn">Save entry</button>
        <button class="btn-secondary" id="clearBtn" type="button">Clear form</button>
      </div>
    </section>

    <section class="card">
      <h2>Saved Weekly Notes</h2>

      <div class="toolbar">
        <input id="search" type="text" placeholder="Search by date, notes, or attendee" style="flex:1 1 260px;" />
        <button class="btn-secondary" id="exportBtn" type="button">Export JSON</button>
      </div>

      <div class="toolbar" style="margin-top: 0; margin-bottom: 16px;">
        <button class="btn-secondary" id="importBtn" type="button">Import JSON</button>
        <input id="importFile" type="file" accept="application/json,.json" style="display:none;" />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Attendees</th>
              <th>Meeting Notes</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const members = [
      "Ahmad Tawfiq",
      "Cid Dieguez",
      "Dai Nelsey",
      "Dhiyyaz Razip",
      "Erey Helmy",
      "Federica Santoro",
      "Habibuzaid Bahari",
      "Hamed Faizi",
      "Hoang Nguyen",
      "Kamil Adamek",
      "Karol Filipowski",
      "Lucas Marques",
      "Mateus Belbuche",
      "Mohd Firdaus Bin Faudz",
      "Salim Silveira",
      "Siti Salwa Samigin",
      "Vinnie Charrot"
    ];

    const storageKey = "geo-crew-weekly-catchup";
    let editingId = null;
    const tableBody = document.getElementById("tableBody");
    const attendeeList = document.getElementById("attendeeList");

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function buildAttendeeChecklist() {
      attendeeList.innerHTML = members.map((name, index) => `
        <div class="check-item">
          <input type="checkbox" id="attendee-${index}" value="${escapeHtml(name)}">
          <label for="attendee-${index}">${escapeHtml(name)}</label>
        </div>
      `).join("");
    }

    function getSelectedAttendees() {
      return Array.from(attendeeList.querySelectorAll('input[type="checkbox"]:checked'))
        .map(el => el.value);
    }

    function setSelectedAttendees(selected) {
      const selectedSet = new Set(Array.isArray(selected) ? selected : []);
      attendeeList.querySelectorAll('input[type="checkbox"]').forEach(box => {
        box.checked = selectedSet.has(box.value);
      });
    }

    function getEntries() {
      const saved = localStorage.getItem(storageKey);
      if (!saved) return [];
      try {
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function setEntries(entries) {
      localStorage.setItem(storageKey, JSON.stringify(entries));
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value + "T00:00:00");
      return d.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function clearForm() {
      editingId = null;
      document.getElementById("date").value = "";
      document.getElementById("notes").value = "";
      setSelectedAttendees([]);
      document.getElementById("saveBtn").textContent = "Save entry";
    }

    function fillForm(item) {
      editingId = item.id;
      document.getElementById("date").value = item.date || "";
      document.getElementById("notes").value = item.notes || "";
      setSelectedAttendees(item.attendees || []);
      document.getElementById("saveBtn").textContent = "Update entry";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function render() {
      const q = document.getElementById("search").value.trim().toLowerCase();

      const entries = getEntries()
        .slice()
        .sort((a, b) => (b.date || "").localeCompare(a.date || ""))
        .filter(item => {
          const hay = [
            item.date,
            item.notes,
            ...(Array.isArray(item.attendees) ? item.attendees : [])
          ].join(" ").toLowerCase();
          return !q || hay.includes(q);
        });

      tableBody.innerHTML = "";

      if (!entries.length) {
        tableBody.innerHTML = '<tr><td colspan="4" class="muted">No weekly notes found. Import a JSON file to begin.</td></tr>';
        return;
      }

      for (const item of entries) {
        const attendeeText = Array.isArray(item.attendees) && item.attendees.length
          ? item.attendees.map(escapeHtml).join(", ")
          : "—";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${formatDate(item.date)}</td>
          <td>${attendeeText}</td>
          <td>${escapeHtml(item.notes || "—")}</td>
          <td>
            <div class="actions">
              <button class="btn-secondary" data-action="edit" data-id="${item.id}">Edit</button>
              <button class="btn-secondary" data-action="delete" data-id="${item.id}">Delete</button>
            </div>
          </td>
        `;
        tableBody.appendChild(tr);
      }
    }

    document.getElementById("saveBtn").addEventListener("click", () => {
      const date = document.getElementById("date").value;
      const notes = document.getElementById("notes").value.trim();
      const attendees = getSelectedAttendees();

      if (!date || !notes) {
        alert("Please complete date and meeting notes.");
        return;
      }

      const entries = getEntries();

      if (editingId) {
        const idx = entries.findIndex(x => x.id === editingId);
        if (idx >= 0) {
          entries[idx] = { ...entries[idx], date, notes, attendees };
        }
      } else {
        entries.push({
          id: crypto.randomUUID(),
          date,
          notes,
          attendees
        });
      }

      setEntries(entries);
      clearForm();
      render();
    });

    document.getElementById("clearBtn").addEventListener("click", clearForm);
    document.getElementById("search").addEventListener("input", render);

    document.getElementById("exportBtn").addEventListener("click", () => {
      const data = JSON.stringify(getEntries(), null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "geo-crew-weekly-catchup.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById("importBtn").addEventListener("click", () => {
      document.getElementById("importFile").click();
    });

    document.getElementById("importFile").addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (!Array.isArray(parsed)) throw new Error("Invalid format");

        const cleaned = parsed
          .filter(item => item && typeof item === "object")
          .map(item => ({
            id: item.id || crypto.randomUUID(),
            date: item.date || "",
            notes: item.notes || "",
            attendees: Array.isArray(item.attendees) ? item.attendees : []
          }));

        setEntries(cleaned);
        clearForm();
        render();
        alert("JSON imported successfully.");
      } catch {
        alert("Could not import this JSON file.");
      } finally {
        event.target.value = "";
      }
    });

    tableBody.addEventListener("click", (event) => {
      const btn = event.target.closest("button[data-action]");
      if (!btn) return;

      const { action, id } = btn.dataset;
      const entries = getEntries();
      const item = entries.find(x => x.id === id);
      if (!item) return;

      if (action === "edit") {
        fillForm(item);
      }

      if (action === "delete") {
        const next = entries.filter(x => x.id !== id);
        setEntries(next);
        if (editingId === id) clearForm();
        render();
      }
    });

    buildAttendeeChecklist();
    render();
  </script>
</body>
</html>
