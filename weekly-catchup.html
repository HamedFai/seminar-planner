<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geo Crew — Weekly Catch-up</title>
  <style>
    :root {
      --card: #ffffff;
      --card-soft: #f8fbff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ee;
      --accent: #1f5fbf;
      --accent-soft: #eaf2ff;
      --radius-sm: 10px;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 2px 12px rgba(18, 40, 76, 0.07);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #eef2f8;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    /* ── Hero ── */
    .hero {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }

    .hero-left { display: flex; flex-direction: column; gap: 6px; }

    .eyebrow {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 700;
      width: fit-content;
    }

    h1 { margin: 0; font-size: clamp(22px, 3.5vw, 32px); line-height: 1.15; font-weight: 700; }
    h2 { margin: 0 0 16px; font-size: 17px; font-weight: 700; }
    h3 { margin: 0 0 12px; font-size: 16px; font-weight: 700; }
    h4 { margin: 0 0 10px; font-size: 14px; font-weight: 700; }

    .nav { display: flex; gap: 8px; flex-wrap: wrap; }

    .nav a {
      display: inline-block;
      text-decoration: none;
      background: #eef3f9;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--line);
      transition: background 0.15s;
    }
    .nav a:hover { background: #e0eaf7; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    /* ── Entry layout ── */
    .entry-layout { display: grid; grid-template-columns: 1fr; gap: 16px; }

    .entry-top-row {
      display: grid;
      grid-template-columns: 200px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    /* ── Panels (inner) ── */
    .panel {
      background: #f8fbff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }

    /* ── Form fields ── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--text); }

    input, select, textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      background: #fff;
      font: inherit;
      font-size: 14px;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #7aabf0;
      box-shadow: 0 0 0 3px rgba(31, 95, 191, 0.10);
    }

    textarea { min-height: 200px; resize: vertical; line-height: 1.6; }

    /* ── Attendee checklist ── */
    .checklist {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 12px;
      background: #fff;
    }

    .check-item { display: flex; align-items: center; gap: 8px; }

    .check-item input[type="checkbox"] {
      width: 15px; height: 15px; margin: 0; flex-shrink: 0; accent-color: var(--accent);
    }

    .check-item label { font-size: 13px; font-weight: 500; line-height: 1.3; cursor: pointer; }

    /* ── Action item form grid ── */
    .ai-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .ai-form-grid .full { grid-column: 1 / -1; }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 9px 16px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: #f0f4f9;
      color: var(--text);
      transition: background 0.13s, transform 0.12s;
      white-space: nowrap;
    }
    .btn:hover { background: #e2eaf5; transform: translateY(-1px); }
    .btn:active { transform: none; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(31, 95, 191, 0.22);
    }
    .btn-primary:hover { background: #174fa8; border-color: #174fa8; }

    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    /* ── Action items table ── */
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      margin-top: 14px;
    }

    table { width: 100%; border-collapse: collapse; min-width: 640px; }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f4f7fc;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    tr:last-child td { border-bottom: 0; }

    .row-actions { display: flex; gap: 6px; }

    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-badge.open   { background: #fee2e2; color: #b91c1c; }
    .status-badge.closed { background: #dcfce7; color: #15803d; }

    /* ── Saved list ── */
    .saved-list { display: grid; gap: 16px; }

    .saved-entry {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .saved-entry-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: #f8fbff;
      flex-wrap: wrap;
    }

    .saved-entry-meta { display: grid; gap: 5px; }
    .saved-entry-meta h3 { margin: 0; font-size: 16px; }

    .meta-pills { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 13px; color: var(--muted); }

    .saved-entry-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      align-items: start;
    }

    .saved-section { padding: 18px 20px; min-width: 0; }
    .saved-section + .saved-section { border-left: 1px solid var(--line); }

    .saved-section-title {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .saved-notes { white-space: pre-wrap; word-break: break-word; line-height: 1.65; font-size: 14px; }

    .saved-ai-list { display: grid; gap: 8px; }

    .saved-ai-item {
      background: #f8fbff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .saved-ai-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }

    .saved-ai-category {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 2px 8px;
      border-radius: 999px;
    }

    .saved-ai-desc { font-weight: 600; font-size: 14px; line-height: 1.45; margin-bottom: 6px; word-break: break-word; }
    .saved-ai-meta { display: flex; flex-wrap: wrap; gap: 4px 14px; color: var(--muted); font-size: 12px; }

    .muted { color: var(--muted); font-size: 13px; }

    .section-divider { border: none; border-top: 1px solid var(--line); margin: 20px 0 18px; }

    @media (max-width: 900px) {
      .saved-entry-body { grid-template-columns: 1fr; }
      .saved-section + .saved-section { border-left: none; border-top: 1px solid var(--line); }
    }

    @media (max-width: 700px) {
      .entry-top-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .wrap { padding: 14px 12px 40px; }
      .hero { padding: 18px; }
      .card { padding: 16px; }
      .ai-form-grid { grid-template-columns: 1fr; }
      .ai-form-grid .full { grid-column: 1; }
      .checklist { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <header class="hero">
      <div class="hero-left">
        <span class="eyebrow">Geo Crew</span>
        <h1>Weekly Catch-up</h1>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="action-items.html">Action Items</a>
        <a href="seminars.html">Seminar Planner</a>
      </nav>
    </header>

    <!-- ── Add / Edit Entry ── -->
    <section class="card">
      <div class="card-header">
        <h2 style="margin-bottom:0;">Add Weekly Notes</h2>
      </div>

      <div class="entry-layout">

        <!-- Top row: date + attendees -->
        <div class="entry-top-row">
          <div class="panel">
            <div class="field">
              <label for="date">Meeting Date</label>
              <input id="date" type="date" />
            </div>
          </div>
          <div class="panel">
            <div class="field">
              <label>Attendees</label>
              <div id="attendeeList" class="checklist"></div>
            </div>
          </div>
        </div>

        <!-- Notes + action item form: full width -->
        <div style="display:grid; gap:16px; min-width:0;">

          <div class="panel">
            <div class="field">
              <label for="notes">Meeting Notes</label>
              <textarea id="notes" placeholder="Capture discussion points, decisions, blockers, and updates…"></textarea>
            </div>
          </div>

          <div class="panel">
            <h3 style="margin-bottom:14px;">Action Item Details</h3>

            <div class="ai-form-grid">
              <div class="field">
                <label for="ai-category">Category</label>
                <select id="ai-category">
                  <option value="">Select category</option>
                  <option>General Admin</option>
                  <option>Rome Laboratory</option>
                  <option>Data Platform</option>
                  <option>Offshore Ops</option>
                  <option>System &amp; Procedures</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="field">
                <label for="ai-delegated-to">Delegated To</label>
                <select id="ai-delegated-to"></select>
              </div>
              <div class="field full">
                <label for="ai-description">Action Item</label>
                <input id="ai-description" type="text" placeholder="Describe the action item" />
              </div>
              <div class="field">
                <label for="ai-due-date">Due Date</label>
                <input id="ai-due-date" type="date" />
              </div>
              <div class="field">
                <label for="ai-status">Status</label>
                <select id="ai-status">
                  <option>Open</option>
                  <option>Closed</option>
                </select>
              </div>
            </div>

            <div class="toolbar" style="margin-top:14px;">
              <button class="btn btn-primary" id="add-ai-btn" type="button">Add Item</button>
              <button class="btn" id="clear-ai-form-btn" type="button">Clear Item</button>
            </div>

            <hr class="section-divider" />

            <h4>Action Items for Current Entry</h4>
            <div class="table-wrap">
              <table id="currentActionItemsTable">
                <thead>
                  <tr>
                    <th>Category</th>
                    <th>Action Item</th>
                    <th>Delegated To</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="currentActionItemsTableBody">
                  <tr><td colspan="6" class="muted">No action items added yet.</td></tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>

      <div class="toolbar" style="margin-top:20px;">
        <button class="btn btn-primary" id="saveBtn" type="button">Save Entry</button>
        <button class="btn" id="clearBtn" type="button">Clear Form</button>
      </div>
    </section>

    <!-- ── Record ── -->
    <section class="card">
      <div class="card-header">
        <h2 style="margin-bottom:0;">Weekly Notes &amp; Action Items</h2>
      </div>

      <div class="toolbar" style="margin-bottom:16px;">
        <input id="search" type="text" placeholder="Search by date, notes, attendee, or action item…" style="flex:1 1 220px;" />
        <button class="btn" id="exportBtn" type="button">Export JSON</button>
        <button class="btn" id="importBtn" type="button">Import JSON</button>
        <input id="importFile" type="file" accept="application/json,.json" style="display:none;" />
      </div>

      <div id="savedEntries" class="saved-list"></div>
    </section>

  </div>

  <script>
    const members = [
      "Ahmad Tawfiq","Cid Dieguez","Dai Nelsey","Dhiyyaz Razip","Erey Helmy",
      "Federica Santoro","Habibuzaid Bahari","Hamed Faizi","Hoang Nguyen",
      "Kamil Adamek","Karol Filipowski","Lucas Marques","Mateus Belbuche",
      "Mohd Firdaus Bin Faudz","Salim Silveira","Siti Salwa Samigin","Vinnie Charrot"
    ];

    const storageKey = "geo-crew-weekly-catchup";
    let editingId = null;
    let currentActionItems = [];
    let currentAIEditingId = null;

    const savedEntries  = document.getElementById("savedEntries");
    const attendeeList  = document.getElementById("attendeeList");
    const aiCategory    = document.getElementById("ai-category");
    const aiDelegatedTo = document.getElementById("ai-delegated-to");
    const aiDescription = document.getElementById("ai-description");
    const aiDueDate     = document.getElementById("ai-due-date");
    const aiStatus      = document.getElementById("ai-status");
    const currentAIBody = document.getElementById("currentActionItemsTableBody");
    const addAiBtn      = document.getElementById("add-ai-btn");

    function escapeHtml(str) {
      return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }

    function buildAttendeeChecklist() {
      attendeeList.innerHTML = members.map((name, i) => `
        <div class="check-item">
          <input type="checkbox" id="att-${i}" value="${escapeHtml(name)}" />
          <label for="att-${i}">${escapeHtml(name)}</label>
        </div>`).join("");
    }

    function buildAIAssigneeList() {
      aiDelegatedTo.innerHTML = '<option value="">Not Assigned</option>';
      members.forEach(name => {
        const o = document.createElement("option"); o.value = o.textContent = name; aiDelegatedTo.appendChild(o);
      });
    }

    function getSelectedAttendees() {
      return Array.from(attendeeList.querySelectorAll('input[type="checkbox"]:checked')).map(el => el.value);
    }

    function setSelectedAttendees(selected) {
      const s = new Set(Array.isArray(selected) ? selected : []);
      attendeeList.querySelectorAll('input[type="checkbox"]').forEach(b => { b.checked = s.has(b.value); });
    }

    function getEntries() {
      try { const p = JSON.parse(localStorage.getItem(storageKey)); return Array.isArray(p) ? p : []; }
      catch { return []; }
    }

    function setEntries(e) { localStorage.setItem(storageKey, JSON.stringify(e)); }

    function formatDate(v) {
      if (!v) return "—";
      return new Date(v + "T00:00:00").toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" });
    }

    function clearAIForm() {
      currentAIEditingId = null;
      aiCategory.value = ""; aiDelegatedTo.value = ""; aiDescription.value = "";
      aiDueDate.value = ""; aiStatus.value = "Open";
      addAiBtn.textContent = "Add Item";
    }

    function fillAIForm(ai) {
      currentAIEditingId = ai.id;
      aiCategory.value = ai.category || ""; aiDelegatedTo.value = ai.delegatedTo || "";
      aiDescription.value = ai.description || ""; aiDueDate.value = ai.dueDate || "";
      aiStatus.value = ai.status || "Open";
      addAiBtn.textContent = "Update Item";
    }

    function renderCurrentAITable() {
      currentAIBody.innerHTML = "";
      if (!currentActionItems.length) {
        currentAIBody.innerHTML = '<tr><td colspan="6" class="muted">No action items added yet.</td></tr>';
        return;
      }
      for (const ai of currentActionItems) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(ai.category || "—")}</td>
          <td>${escapeHtml(ai.description || "—")}</td>
          <td>${escapeHtml(ai.delegatedTo || "—")}</td>
          <td>${formatDate(ai.dueDate)}</td>
          <td><span class="status-badge ${(ai.status||"Open").toLowerCase()}">${escapeHtml(ai.status||"Open")}</span></td>
          <td>
            <div class="row-actions">
              <button class="btn" data-action="edit-ai" data-id="${ai.id}" type="button">Edit</button>
              <button class="btn" data-action="delete-ai" data-id="${ai.id}" type="button">Delete</button>
            </div>
          </td>`;
        currentAIBody.appendChild(tr);
      }
    }

    function clearForm() {
      editingId = null;
      document.getElementById("date").value = "";
      document.getElementById("notes").value = "";
      setSelectedAttendees([]);
      currentActionItems = [];
      clearAIForm();
      renderCurrentAITable();
      document.getElementById("saveBtn").textContent = "Save Entry";
    }

    function fillForm(item) {
      editingId = item.id;
      document.getElementById("date").value = item.date || "";
      document.getElementById("notes").value = item.notes || "";
      setSelectedAttendees(item.attendees || []);
      currentActionItems = Array.isArray(item.actionItems) ? [...item.actionItems] : [];
      renderCurrentAITable();
      clearAIForm();
      document.getElementById("saveBtn").textContent = "Update Entry";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderActionItemsDisplay(actionItems) {
      if (!Array.isArray(actionItems) || !actionItems.length) return `<p class="muted">No action items.</p>`;
      return `<div class="saved-ai-list">${actionItems.map(ai => `
        <div class="saved-ai-item">
          <div class="saved-ai-top">
            <span class="saved-ai-category">${escapeHtml(ai.category||"Uncategorized")}</span>
            <span class="status-badge ${(ai.status||"Open").toLowerCase()}">${escapeHtml(ai.status||"Open")}</span>
          </div>
          <div class="saved-ai-desc">${escapeHtml(ai.description||"—")}</div>
          <div class="saved-ai-meta">
            <span><strong>To:</strong> ${escapeHtml(ai.delegatedTo||"—")}</span>
            <span><strong>Due:</strong> ${formatDate(ai.dueDate)}</span>
          </div>
        </div>`).join("")}</div>`;
    }

    function render() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const entries = getEntries()
        .slice().sort((a,b) => (b.date||"").localeCompare(a.date||""))
        .filter(item => {
          if (!q) return true;
          const hay = [item.date, item.notes, ...(item.attendees||[]),
            ...(item.actionItems||[]).map(ai => Object.values(ai).join(" "))].join(" ").toLowerCase();
          return hay.includes(q);
        });

      savedEntries.innerHTML = "";
      if (!entries.length) {
        savedEntries.innerHTML = `<div class="muted">No entries yet. Add an entry above or import a JSON file.</div>`;
        return;
      }

      for (const item of entries) {
        const attendeesText = item.attendees?.length ? item.attendees.map(escapeHtml).join(", ") : "—";
        const article = document.createElement("article");
        article.className = "saved-entry";
        article.innerHTML = `
          <div class="saved-entry-head">
            <div class="saved-entry-meta">
              <h3>${formatDate(item.date)}</h3>
              <div class="meta-pills">
                <span><strong>Attendees:</strong> ${attendeesText}</span>
                <span><strong>Action items:</strong> ${(item.actionItems||[]).length}</span>
              </div>
            </div>
            <div class="row-actions">
              <button class="btn" data-action="edit" data-id="${item.id}" type="button">Edit</button>
              <button class="btn" data-action="delete" data-id="${item.id}" type="button">Delete</button>
            </div>
          </div>
          <div class="saved-entry-body">
            <section class="saved-section">
              <p class="saved-section-title">Meeting Notes</p>
              <div class="saved-notes">${escapeHtml(item.notes||"—")}</div>
            </section>
            <section class="saved-section">
              <p class="saved-section-title">Action Items</p>
              ${renderActionItemsDisplay(item.actionItems)}
            </section>
          </div>`;
        savedEntries.appendChild(article);
      }
    }

    document.getElementById("saveBtn").addEventListener("click", () => {
      const date  = document.getElementById("date").value;
      const notes = document.getElementById("notes").value.trim();
      const attendees = getSelectedAttendees();
      if (!date || !notes) { alert("Please complete date and meeting notes."); return; }
      const entries = getEntries();
      if (editingId) {
        const idx = entries.findIndex(x => x.id === editingId);
        if (idx >= 0) entries[idx] = { ...entries[idx], date, notes, attendees, actionItems: currentActionItems };
      } else {
        entries.push({ id: crypto.randomUUID(), date, notes, attendees, actionItems: currentActionItems });
      }
      setEntries(entries); clearForm(); render();
    });

    document.getElementById("clear-ai-form-btn").addEventListener("click", clearAIForm);

    addAiBtn.addEventListener("click", () => {
      const category = aiCategory.value;
      const description = aiDescription.value.trim();
      if (!category || !description) { alert("Please select a category and provide a description."); return; }
      const item = { category, delegatedTo: aiDelegatedTo.value, description, dueDate: aiDueDate.value, status: aiStatus.value };
      if (currentAIEditingId) {
        const idx = currentActionItems.findIndex(ai => ai.id === currentAIEditingId);
        if (idx >= 0) currentActionItems[idx] = { ...currentActionItems[idx], ...item };
      } else {
        currentActionItems.push({ id: crypto.randomUUID(), ...item });
      }
      clearAIForm(); renderCurrentAITable();
    });

    document.getElementById("clearBtn").addEventListener("click", clearForm);
    document.getElementById("search").addEventListener("input", render);

    // document.getElementById("exportBtn").addEventListener("click", () => {
    //   const blob = new Blob([JSON.stringify(getEntries(), null, 2)], { type: "application/json" });
    //   const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: "geo-crew-weekly-catchup.json" });
    //   a.click(); URL.revokeObjectURL(a.href);
    // });

    document.getElementById("exportBtn").addEventListener("click", () => {
      const now = new Date();
    
      // Format date as YYYYMMDD
      const date = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, "0")}${String(now.getDate()).padStart(2, "0")}`;
    
      // Find next available index (-01, -02, etc.)
      let index = 1;
      let filename;
    
      while (true) {
        const suffix = String(index).padStart(2, "0");
        filename = `${date}-${suffix}_meetingNotes.json`;
    
        // Check if this filename was already used in this session
        if (!window._exportedFilenames) window._exportedFilenames = new Set();
    
        if (!window._exportedFilenames.has(filename)) {
          window._exportedFilenames.add(filename);
          break;
        }
    
        index++;
      }
    
      const blob = new Blob(
        [JSON.stringify(getEntries(), null, 2)],
        { type: "application/json" }
      );
    
      const a = Object.assign(document.createElement("a"), {
        href: URL.createObjectURL(blob),
        download: filename
      });
    
      a.click();
      URL.revokeObjectURL(a.href);
    });

    document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());

    document.getElementById("importFile").addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        if (!Array.isArray(parsed)) throw new Error();
        const cleaned = parsed.filter(x => x && typeof x === "object").map(item => ({
          id: item.id || crypto.randomUUID(), date: item.date||"", notes: item.notes||"",
          attendees: Array.isArray(item.attendees) ? item.attendees : [],
          actionItems: Array.isArray(item.actionItems) ? item.actionItems.map(ai => ({
            id: ai.id||crypto.randomUUID(), category: ai.category||"", description: ai.description||"",
            delegatedTo: ai.delegatedTo||"", dueDate: ai.dueDate||"",
            status: ["Open","Closed"].includes(ai.status) ? ai.status : "Open"
          })) : []
        }));
        setEntries(cleaned); clearForm(); render();
        alert("JSON imported successfully.");
      } catch { alert("Could not import this JSON file."); }
      finally { e.target.value = ""; }
    });

    savedEntries.addEventListener("click", e => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const { action, id } = btn.dataset;
      const entries = getEntries();
      const item = entries.find(x => x.id === id);
      if (!item) return;
      if (action === "edit") fillForm(item);
      if (action === "delete") { setEntries(entries.filter(x => x.id !== id)); if (editingId===id) clearForm(); render(); }
    });

    currentAIBody.addEventListener("click", e => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const { action, id } = btn.dataset;
      const ai = currentActionItems.find(x => x.id === id);
      if (!ai) return;
      if (action === "edit-ai") fillAIForm(ai);
      if (action === "delete-ai") {
        currentActionItems = currentActionItems.filter(x => x.id !== id);
        if (currentAIEditingId === id) clearAIForm();
        renderCurrentAITable();
      }
    });

    buildAttendeeChecklist();
    buildAIAssigneeList();
    renderCurrentAITable();
    render();
  </script>
</body>
</html>
